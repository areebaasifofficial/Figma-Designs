<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Widget</title>
    <style>
        :root {
            --primary-blue: #4d44f3;
            --bg-gray: #f8fafc;
            --text-gray: #94a3b8;
            --text-dark: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calendar-card {
            background: white;
            border-radius: 16px;
            width: 350px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h2 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--text-dark);
        }

        .back-arrow {
            color: #ff7e7e;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .date-input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-dark);
            font-weight: 500;
        }

        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .nav-btn {
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .month-title {
            font-weight: bold;
            color: var(--text-dark);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            gap: 10px 5px;
        }

        .day-name {
            font-size: 0.75rem;
            color: var(--text-gray);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .day {
            font-size: 0.9rem;
            color: var(--text-gray);
            padding: 8px 0;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .day:hover {
            background-color: var(--bg-gray);
        }

        .day.selected {
            background-color: var(--primary-blue);
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="calendar-card">
    <div class="header">
        <h2>Calendar</h2>
        <span class="back-arrow">↩</span>
    </div>

    <div class="date-input">
        <span>June 6, 2023</span>
        <span style="color: #cbd5e1; font-size: 0.8rem;">✕</span>
    </div>

    <div class="month-nav">
        <button class="nav-btn">&lt;</button>
        <div class="month-title">June 2023</div>
        <button class="nav-btn">&gt;</button>
    </div>

    <div class="calendar-grid">
        <!-- Week Days -->
        <div class="day-name">Mon</div>
        <div class="day-name">Tue</div>
        <div class="day-name">Wed</div>
        <div class="day-name">Thu</div>
        <div class="day-name">Fri</div>
        <div class="day-name">Sat</div>
        <div class="day-name">Sun</div>

        <!-- Dates (Partial Grid) -->
        <div class="day"></div> <!-- Offset -->
        <div class="day">1</div>
        <div class="day">2</div>
        <div class="day">3</div>
        <div class="day">4</div>
        <div class="day">5</div>
        <div class="day selected">6</div>
        
        <div class="day">7</div>
        <div class="day">8</div>
        <div class="day">9</div>
        <div class="day">10</div>
        <div class="day">11</div>
        <div class="day">12</div>
        <div class="day">13</div>

        <div class="day">14</div>
        <div class="day">15</div>
        <div class="day">16</div>
        <div class="day">17</div>
        <div class="day">18</div>
        <div class="day">19</div>
        <div class="day">20</div>

        <div class="day">21</div>
        <div class="day">22</div>
        <div class="day">23</div>
        <div class="day">24</div>
        <div class="day">25</div>
        <div class="day">26</div>
        <div class="day">27</div>

        <div class="day">28</div>
        <div class="day">29</div>
        <div class="day">30</div>
        <div class="day">31</div>
    </div>
</div>

</body>
</html>
