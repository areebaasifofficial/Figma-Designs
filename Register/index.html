<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Sign-Up Page</title>
</head>
<body>
    <img src="assets/images/background/bg.png" alt="" class="img">
    <div class="container">
        <div class="section">
            <img src="assets/images/photos/image.jfif" alt="Image">
        </div>
        <div class="form">
            <h2>Sign Up</h2>
            <form>
                <div class="input">
                    <i id="icn" class="fa-regular fa-user"></i></i><input type="text" placeholder="Enter First Name"required>
                </div>
                <div class="input">
                    <i id="icn" class="fa-regular fa-user"></i><input type="text" placeholder="Enter Last Name" required>
                </div>
                <div class="input">
                    <i id="icn" class="fa-solid fa-user"></i> <input type="text" placeholder="Enter Username" required>
                </div>
                <div class="input">
                    <i id="icn" class="fa-solid fa-envelope"></i><input type="email" placeholder="Enter Email" required>
                </div>
                <div class="input">
                    <i id="icn" class="fa-solid fa-lock"></i><input type="password" placeholder="Enter Password"required>
                </div>
                <div class="input">
                    <i id="icn" class="fa-solid fa-lock"></i><input type="password" placeholder="Confirm Password"required>
                </div>
                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label>I agree to all terms</label>
                </div>
                <button type="submit" class="register-btn">Register</button>
            </form>
            <p>Already have an account?<a href="#">Sign In</a></p>
        </div>
    </div>
</body>
</html>
