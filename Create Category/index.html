<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Create-Categories</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="logo"><span class="dash">TO</span>-DO</div>
      <header class="topbar">
  <div class="search-box">
    <input type="text" placeholder="Search your task here...">
    <i class="fa-solid fa-magnifying-glass search-icon"></i>
  </div>
  <div class="top-icons">
    <i class="fa fa-bell"></i>
    <i class="fa fa-calendar"></i>
    <span class="date">Tuesday<br><small>20/06/2023</small></span>
  </div>
</header>
  </nav>
  <div class="dashboard">
  <aside class="sidebar">
    <div class="profile">
      <img src="boy.jpeg" alt="">
      <h3>Sundar Gurung</h3>
      <p>sundargurung360@gmail.com</p>
    </div>
    <ul class="menu">
      <li><i class="fa fa-home"></i> Dashboard</li>
      <li><i class="fa-solid fa-exclamation fa-xl"></i> Vital Task</li>
      <li><i class="fa fa-list"></i> My Task</li>
      <li class="active"><i class="fa fa-layer-group"></i> Task Categories</li>
      <li><i class="fa fa-cog"></i> Settings</li>
      <li><i class="fa fa-question-circle"></i> Help</li>
    </ul>
    <div class="logout">
      <i class="fa fa-sign-out-alt"></i> Logout
    </div>
  </aside>
  <main>
    <div class="grid">
      <div class="card">
      <div class="card-header">
        <h3>Create Categories</h3>
        <div class="hr">______</div>
        <span class="back">Go Back</span>
      </div>
      <form action="">
        <label for="">Category Name</label><br>
        <input type="text">
      </form>
      <div class="buttons">
        <button class="update">Create</button>
        <button class="cancel">Cancel</button>
      </div>
    </div>
  </main>
</div>
</body>
</html>
